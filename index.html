<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rim Light Studio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sora', sans-serif; }
    html, body { height: 100%; margin: 0; }

    .color-swatch {
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .color-swatch.active { border-color: #fff; transform: scale(1.15); }
    .color-swatch:hover { transform: scale(1.1); }

    .slider-track {
      -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
      border-radius: 3px; background: #2a2a3e; outline: none;
    }
    .slider-track::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: #fff; cursor: pointer; box-shadow: 0 0 8px rgba(255,255,255,0.4);
    }
    .slider-track::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%; border: none;
      background: #fff; cursor: pointer;
    }

    .upload-zone {
      border: 2px dashed #4a4a6a; border-radius: 16px;
      transition: all 0.3s; cursor: pointer;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #7c6aef; background: rgba(124,106,239,0.08);
    }

    .glow-preview { position: relative; display: inline-block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .fade-up-d1 { animation-delay: 0.1s; opacity: 0; }
    .fade-up-d2 { animation-delay: 0.2s; opacity: 0; }
    .fade-up-d3 { animation-delay: 0.3s; opacity: 0; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 10px; z-index: 100;
      background: #1e1e30; color: #ccc; font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);}}
    @keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(10px);}}
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto" style="background: #0e0e1a; color: #e0e0f0;">
  <div id="app" class="h-full w-full flex flex-col">
   <!-- Header -->
   <header class="px-6 py-4 flex items-center justify-between shrink-0" style="background: rgba(14,14,26,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #1e1e32;">
    <div class="flex items-center gap-3">
     <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #7c6aef, #e06aef);">
      <i data-lucide="sun" style="width:18px;height:18px;color:#fff;"></i>
     </div>
     <h1 id="appTitle" class="text-lg font-semibold tracking-tight" style="color:#f0eeff;">Rim Light Studio</h1>
    </div><button id="downloadBtn" class="hidden items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all hover:scale-105" style="background: linear-gradient(135deg, #7c6aef, #a06aef); color: #fff;"> <i data-lucide="download" style="width:15px;height:15px;"></i> <span>Export</span> </button>
   </header><!-- Main content -->
   <main class="flex-1 flex flex-col lg:flex-row overflow-auto">
    <!-- Canvas area -->
    <div class="flex-1 flex items-center justify-center p-4 min-h-0">
     <!-- Upload zone -->
     <div id="uploadZone" class="upload-zone w-full max-w-lg flex flex-col items-center justify-center gap-4 p-10 fade-up">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center" style="background: #1a1a2e;">
       <i data-lucide="image-plus" style="width:30px;height:30px;color:#7c6aef;"></i>
      </div>
      <div class="text-center">
       <p id="uploadHint" class="text-base font-medium" style="color:#c0c0e0;">Drop your photo here</p>
       <p class="text-xs mt-1" style="color:#6a6a8a;">or click to browse • PNG, JPG, WebP</p>
      </div><input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" class="hidden">
     </div><!-- Preview canvas -->
     <div id="previewArea" class="hidden flex flex-col items-center gap-3 w-full max-w-2xl">
      <div class="relative rounded-xl overflow-hidden shadow-2xl" style="background:#111122;">
       <canvas id="mainCanvas" class="block max-w-full" style="max-height: 65vh;"></canvas>
      </div><button id="changePhoto" class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full transition-all hover:scale-105" style="background:#1e1e32; color:#8a8aaf;"> <i data-lucide="refresh-cw" style="width:12px;height:12px;"></i> Change photo </button>
     </div>
    </div><!-- Controls panel -->
    <aside id="controlsPanel" class="hidden lg:w-72 w-full shrink-0 p-5 overflow-auto" style="background:#12121f; border-left: 1px solid #1e1e32;">
     <div class="space-y-6 fade-up fade-up-d1">
      <!-- Rim Color -->
      <section>
       <label class="text-xs font-semibold uppercase tracking-widest" style="color:#6a6a8e;">Rim Color</label>
       <div class="flex flex-wrap gap-2.5 mt-3" id="colorSwatches"></div>
       <div class="mt-3 flex items-center gap-2">
        <label class="text-xs" style="color:#6a6a8e;">Custom</label> <input type="color" id="customColor" value="#7c6aef" class="w-8 h-8 rounded-lg cursor-pointer border-0" style="background:transparent;">
       </div>
      </section><!-- Intensity -->
      <section>
       <div class="flex justify-between items-center mb-2">
        <label class="text-xs font-semibold uppercase tracking-widest" style="color:#6a6a8e;">Intensity</label> <span id="intensityVal" class="text-xs" style="color:#8a8aaf;">50%</span>
       </div><input type="range" id="intensitySlider" class="slider-track" min="10" max="100" value="50">
      </section><!-- Glow Spread -->
      <section>
       <div class="flex justify-between items-center mb-2">
        <label class="text-xs font-semibold uppercase tracking-widest" style="color:#6a6a8e;">Glow Spread</label> <span id="spreadVal" class="text-xs" style="color:#8a8aaf;">8px</span>
       </div><input type="range" id="spreadSlider" class="slider-track" min="2" max="25" value="8">
      </section><!-- Rim Thickness -->
      <section>
       <div class="flex justify-between items-center mb-2">
        <label class="text-xs font-semibold uppercase tracking-widest" style="color:#6a6a8e;">Rim Width</label> <span id="thicknessVal" class="text-xs" style="color:#8a8aaf;">2px</span>
       </div><input type="range" id="thicknessSlider" class="slider-track" min="1" max="6" value="2">
      </section><!-- Light Direction -->
      <section>
       <label class="text-xs font-semibold uppercase tracking-widest" style="color:#6a6a8e;">Light Direction</label>
       <div class="grid grid-cols-3 gap-2 mt-3" id="directionGrid"></div>
      </section><!-- Gaussian Blur -->
      <section>
       <div class="flex justify-between items-center mb-2">
        <label class="text-xs font-semibold uppercase tracking-widest" style="color:#6a6a8e;">Gaussian Softness</label> <span id="blurVal" class="text-xs" style="color:#8a8aaf;">1.5px</span>
       </div><input type="range" id="blurSlider" class="slider-track" min="0" max="50" value="15">
      </section>
     </div>
    </aside>
   </main>
  </div>
  <script>
    // ===== Config & State =====
    const defaultConfig = {
      app_title: 'Rim Light Studio',
      upload_hint: 'Drop your photo here',
      background_color: '#0e0e1a',
      surface_color: '#12121f',
      text_color: '#e0e0f0',
      accent_color: '#7c6aef',
      secondary_accent: '#e06aef',
      font_family: 'Sora',
      font_size: 14
    };

    const presetColors = [
      '#7c6aef','#e06aef','#6ae0ef','#efcf6a','#ef6a6a',
      '#6aef8a','#ff7e45','#45c2ff','#ff45a0','#ffffff'
    ];

    const directions = [
      { label:'↖', angle: 225 },{ label:'↑', angle: 270 },{ label:'↗', angle: 315 },
      { label:'←', angle: 180 },{ label:'●', angle: -1 },{ label:'→', angle: 0 },
      { label:'↙', angle: 135 },{ label:'↓', angle: 90 },{ label:'↘', angle: 45 }
    ];

    let originalImage = null;
    let selectedColor = '#7c6aef';
    let intensity = 50;
    let spread = 8;
    let thickness = 2;
    let lightAngle = 315; // top-right default
    let gaussianBlur = 1.5;
    let isProcessing = false;

    // ===== Element SDK =====
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const t = config.app_title || defaultConfig.app_title;
        const h = config.upload_hint || defaultConfig.upload_hint;
        const bg = config.background_color || defaultConfig.background_color;
        const sf = config.surface_color || defaultConfig.surface_color;
        const tx = config.text_color || defaultConfig.text_color;
        const ac = config.accent_color || defaultConfig.accent_color;
        const font = config.font_family || defaultConfig.font_family;
        const fs = config.font_size || defaultConfig.font_size;

        document.getElementById('appTitle').textContent = t;
        document.getElementById('uploadHint').textContent = h;
        document.body.style.background = bg;
        document.body.style.color = tx;
        document.body.style.fontFamily = `${font}, sans-serif`;
        document.querySelector('aside').style.background = sf;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
          { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
          { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
          { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }},
          { get: () => config.secondary_accent || defaultConfig.secondary_accent, set: v => { config.secondary_accent = v; window.elementSdk.setConfig({ secondary_accent: v }); }}
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['upload_hint', config.upload_hint || defaultConfig.upload_hint]
      ])
    });

    // ===== UI Setup =====
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const controlsPanel = document.getElementById('controlsPanel');
    const downloadBtn = document.getElementById('downloadBtn');
    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d', { willReadFrequently: true });

    // Color swatches
    const swatchContainer = document.getElementById('colorSwatches');
    presetColors.forEach(c => {
      const s = document.createElement('div');
      s.className = 'color-swatch' + (c === selectedColor ? ' active' : '');
      s.style.background = c;
      s.addEventListener('click', () => {
        selectedColor = c;
        document.getElementById('customColor').value = c;
        document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
        s.classList.add('active');
        renderRimLight();
      });
      swatchContainer.appendChild(s);
    });

    document.getElementById('customColor').addEventListener('input', e => {
      selectedColor = e.target.value;
      document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
      renderRimLight();
    });

    // Direction grid
    const dirGrid = document.getElementById('directionGrid');
    directions.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'w-full aspect-square rounded-lg text-sm font-medium transition-all';
      btn.textContent = d.label;
      const isActive = d.angle === lightAngle;
      btn.style.cssText = isActive
        ? 'background:#7c6aef;color:#fff;'
        : 'background:#1e1e32;color:#8a8aaf;';
      btn.addEventListener('click', () => {
        lightAngle = d.angle;
        dirGrid.querySelectorAll('button').forEach(b => b.style.cssText = 'background:#1e1e32;color:#8a8aaf;');
        btn.style.cssText = 'background:#7c6aef;color:#fff;';
        renderRimLight();
      });
      dirGrid.appendChild(btn);
    });

    // Sliders
    document.getElementById('intensitySlider').addEventListener('input', e => {
      intensity = +e.target.value;
      document.getElementById('intensityVal').textContent = intensity + '%';
      renderRimLight();
    });
    document.getElementById('spreadSlider').addEventListener('input', e => {
      spread = +e.target.value;
      document.getElementById('spreadVal').textContent = spread + 'px';
      renderRimLight();
    });
    document.getElementById('thicknessSlider').addEventListener('input', e => {
      thickness = +e.target.value;
      document.getElementById('thicknessVal').textContent = thickness + 'px';
      renderRimLight();
    });
    document.getElementById('blurSlider').addEventListener('input', e => {
      gaussianBlur = +e.target.value / 10;
      document.getElementById('blurVal').textContent = gaussianBlur.toFixed(1) + 'px';
      renderRimLight();
    });

    // ===== File Upload =====
    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault(); uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
    document.getElementById('changePhoto').addEventListener('click', () => fileInput.click());

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          // Size canvas - limit to reasonable dimensions
          const maxW = 900, maxH = 700;
          let w = img.width, h = img.height;
          if (w > maxW) { h *= maxW / w; w = maxW; }
          if (h > maxH) { w *= maxH / h; h = maxH; }
          mainCanvas.width = Math.round(w);
          mainCanvas.height = Math.round(h);
          uploadZone.classList.add('hidden');
          previewArea.classList.remove('hidden');
          previewArea.classList.add('fade-up');
          controlsPanel.classList.remove('hidden');
          controlsPanel.classList.add('fade-up', 'fade-up-d2');
          downloadBtn.classList.remove('hidden');
          downloadBtn.classList.add('flex');
          renderRimLight();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ===== Rim Light Rendering =====
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }

    let renderTimeout;
    function renderRimLight() {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(_renderRimLight, 30);
    }

    function _renderRimLight() {
      if (!originalImage || isProcessing) return;
      isProcessing = true;

      const W = mainCanvas.width, H = mainCanvas.height;

      // Draw original
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(originalImage, 0, 0, W, H);

      const imageData = ctx.getImageData(0, 0, W, H);
      const data = imageData.data;

      // Create alpha mask for edge detection
      const alpha = new Uint8Array(W * H);
      for (let i = 0; i < W * H; i++) {
        alpha[i] = data[i * 4 + 3] > 20 ? 1 : 0;
      }

      // Edge detection using luminance gradient for photos (works on opaque images)
      const luminance = new Float32Array(W * H);
      for (let i = 0; i < W * H; i++) {
        const r = data[i*4], g = data[i*4+1], b = data[i*4+2];
        luminance[i] = 0.299*r + 0.587*g + 0.114*b;
      }

      // Sobel edge detection
      const edgeStrength = new Float32Array(W * H);
      const edgeNormalX = new Float32Array(W * H);
      const edgeNormalY = new Float32Array(W * H);
      let maxEdge = 0;

      for (let y = 1; y < H - 1; y++) {
        for (let x = 1; x < W - 1; x++) {
          const idx = y * W + x;
          // Sobel kernels
          const gx = (
            -luminance[(y-1)*W+(x-1)] + luminance[(y-1)*W+(x+1)]
            -2*luminance[y*W+(x-1)] + 2*luminance[y*W+(x+1)]
            -luminance[(y+1)*W+(x-1)] + luminance[(y+1)*W+(x+1)]
          );
          const gy = (
            -luminance[(y-1)*W+(x-1)] - 2*luminance[(y-1)*W+x] - luminance[(y-1)*W+(x+1)]
            +luminance[(y+1)*W+(x-1)] + 2*luminance[(y+1)*W+x] + luminance[(y+1)*W+(x+1)]
          );
          const mag = Math.sqrt(gx*gx + gy*gy);
          edgeStrength[idx] = mag;
          if (mag > maxEdge) maxEdge = mag;
          // Normal direction of edge
          if (mag > 0) {
            edgeNormalX[idx] = gx / mag;
            edgeNormalY[idx] = gy / mag;
          }
        }
      }

      // Normalize edges
      if (maxEdge > 0) {
        for (let i = 0; i < edgeStrength.length; i++) {
          edgeStrength[i] /= maxEdge;
        }
      }

      // Light direction vector
      let lx = 0, ly = 0;
      if (lightAngle >= 0) {
        const rad = lightAngle * Math.PI / 180;
        lx = Math.cos(rad);
        ly = Math.sin(rad);
      }

      // Create rim light layer on offscreen canvas
      const rimCanvas = document.createElement('canvas');
      rimCanvas.width = W; rimCanvas.height = H;
      const rimCtx = rimCanvas.getContext('2d');
      const rimData = rimCtx.createImageData(W, H);
      const rim = rimData.data;

      const [cr, cg, cb] = hexToRgb(selectedColor);
      // Make glow much brighter and more saturated
      const glowR = Math.min(255, cr + 100);
      const glowG = Math.min(255, cg + 100);
      const glowB = Math.min(255, cb + 100);

      const intensityFactor = intensity / 100;
      const thresholdLow = 0.05;

      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const idx = y * W + x;
          let edge = edgeStrength[idx];
          if (edge < thresholdLow) continue;

          // Apply edge power to thin it out
          edge = Math.pow(edge, 1.2 / Math.max(thickness, 0.5));
          edge = Math.min(1, edge * 1.3); // Boost edge visibility

          // Directional lighting - dot product of edge normal with light direction
          let dirFactor = 1;
          if (lightAngle >= 0) {
            const dot = edgeNormalX[idx] * lx + edgeNormalY[idx] * ly;
            dirFactor = Math.max(0.1, dot * 0.8 + 0.2);
          }

          const a = edge * intensityFactor * dirFactor;
          const pi = idx * 4;
          rim[pi]     = glowR;
          rim[pi + 1] = glowG;
          rim[pi + 2] = glowB;
          rim[pi + 3] = Math.min(255, Math.round(a * 255));
        }
      }

      rimCtx.putImageData(rimData, 0, 0);

      // Redraw original as base
      ctx.drawImage(originalImage, 0, 0, W, H);

      // Apply gaussian blur to rim layer for soft glow
      const totalBlur = gaussianBlur + spread * 0.4;
      if (totalBlur > 0.5) {
        const blurCanvas = document.createElement('canvas');
        blurCanvas.width = W; blurCanvas.height = H;
        const blurCtx = blurCanvas.getContext('2d');
        blurCtx.filter = `blur(${totalBlur}px)`;
        blurCtx.drawImage(rimCanvas, 0, 0);

        // Composite: soft glow first, then sharp rim
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.6 * intensityFactor;
        ctx.drawImage(blurCanvas, 0, 0);
        ctx.globalAlpha = 0.5 * intensityFactor;
        ctx.drawImage(rimCanvas, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
      } else {
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = 0.8 * intensityFactor;
        ctx.drawImage(rimCanvas, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
      }

      isProcessing = false;
    }

    // ===== Download =====
    downloadBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'rimlight-photo.png';
      link.href = mainCanvas.toDataURL('image/png');
      link.click();
      showToast('Photo exported! ✨');
    });

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    lucide.createIcons();
  </script>
